            advice: `为避免用工风险，企业在录用员工时都应该遵守我国法律相关规定，在员工入职一个月之内与员工订立合法的书面劳动合同。请参考劳动合同范本，依法签订劳动合同。<br><br>

    // 获取 URL 中的 no 参数

        return noParam.split(',').map(n => parseInt(n.trim())).filter(n => !isNaN(n) && n >= 1 && n <= 12);
    }
